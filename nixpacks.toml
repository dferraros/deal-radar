[providers]
# Only use Python provider — frontend is pre-built and committed to dist/
# Prevents nixpacks from auto-detecting Node.js and running npm run build
only = ["python"]

[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install -r requirements.txt"
]

[phases.build]
cmds = []

[start]
cmd = ". /opt/venv/bin/activate && python -m alembic upgrade head && uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
